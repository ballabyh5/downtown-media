<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Downtown Media — The Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #000000;
    --ink: #ffffff;
    --muted: #8a8a8a;
    --dim: #5a5a5a;
    --panel: #0b0b0b;
    --line: #ffffff;
    --hair: #242424;
    --accent: #39FF14;
    --accent-ink: #000000;
    --head: "Bebas Neue", "Arial Narrow", sans-serif;
    --body: "Inter", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  ::selection { background: var(--accent); color: #000; }
  img { display: block; max-width: 100%; }

  .app { width: 100%; }
  .wrap { max-width: 1360px; margin: 0 auto; padding: 0 24px; }

  /* ============ MASTHEAD ============ */
  .util {
    border-bottom: 1px solid var(--hair);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--muted); padding: 7px 24px; flex-wrap: wrap; gap: 6px;
  }
  .util__l, .util__r { display: flex; align-items: center; gap: 10px; }
  .util__sep { color: var(--dim); }
  .util__r a:hover { color: var(--ink); }
  .util__cta { color: var(--accent) !important; font-weight: 700; }
  .util__time { color: var(--ink); }

  .mast__main {
    display: flex; align-items: center; gap: 28px;
    padding: 14px 24px; border-bottom: 3px solid var(--line);
  }
  .logo { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
  .logo__mark { color: var(--accent); font-family: var(--head); font-size: 30px; letter-spacing: -3px; transform: skewX(-8deg); }
  .logo__word { font-family: var(--head); font-size: 38px; line-height: 0.8; letter-spacing: 0.5px; }
  .logo__sub {
    font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    background: var(--ink); color: #000; padding: 2px 5px; align-self: center;
  }
  .nav { display: flex; align-items: center; gap: 4px; flex: 1; flex-wrap: wrap; }
  .nav__link {
    font-family: var(--head); font-size: 21px; letter-spacing: 0.5px;
    padding: 4px 10px; line-height: 1; color: var(--ink); position: relative;
    transition: color .12s;
  }
  .nav__link:hover { color: var(--accent); }
  .nav__link.is-active { background: var(--accent); color: #000; }

  .spokes { position: relative; }
  .spokes__btn {
    font-family: var(--head); font-size: 21px; letter-spacing: 0.5px;
    padding: 4px 10px; display: flex; align-items: center; gap: 5px;
    border: 2px solid var(--ink);
  }
  .spokes__btn:hover, .spokes__btn.is-open { background: var(--ink); color: #000; }
  .spokes__chev { font-size: 12px; }
  .spokes__menu {
    position: absolute; top: calc(100% + 8px); left: 0; z-index: 60;
    background: #000; border: 3px solid var(--line); min-width: 240px;
    box-shadow: 8px 8px 0 var(--accent);
  }
  .spokes__head {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--dim);
    padding: 10px 14px 6px;
  }
  .spokes__opt {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px; border-top: 1px solid var(--hair); text-align: left;
    font-family: var(--head); font-size: 22px; letter-spacing: 0.5px;
  }
  .spokes__opt:hover { background: var(--accent); color: #000; }
  .spokes__opt.is-on { color: var(--accent); }
  .spokes__opt.is-on:hover { color: #000; }
  .spokes__opt-sub { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; color: var(--dim); }
  .spokes__opt:hover .spokes__opt-sub { color: #000; }
  .spokes__soon {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--dim);
    padding: 9px 14px; border-top: 1px solid var(--hair);
  }

  .mast__search { flex-shrink: 0; margin-left: auto; }
  .mast__main { flex-wrap: wrap; row-gap: 12px; }
  .nav { order: 3; flex-basis: 100%; }
  @media (max-width: 600px) {
    .mast__main { gap: 14px; }
    .search { width: 130px; }
    .citystrip__hint { display: none; }
  }
  .search {
    background: #0a0a0a; border: 1px solid var(--hair); color: var(--ink);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
    padding: 9px 12px; width: 190px; outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--dim); }

  .citystrip {
    display: flex; align-items: center; gap: 0;
    border-bottom: 1px solid var(--hair); padding: 0 24px;
  }
  .citystrip__tab {
    font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    padding: 9px 16px; color: var(--muted); border-right: 1px solid var(--hair);
  }
  .citystrip__tab:first-child { border-left: 1px solid var(--hair); }
  .citystrip__tab:hover { color: var(--ink); background: #0c0c0c; }
  .citystrip__tab.is-on { background: var(--accent); color: #000; }
  .citystrip__hint {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--dim);
    margin-left: auto; padding: 9px 0;
  }

  /* ============ TICKER ============ */
  .ticker {
    display: flex; align-items: stretch; background: var(--accent); color: #000;
    border-bottom: 3px solid var(--line); position: relative; min-height: 42px;
  }
  .ticker__badge {
    background: #000; color: var(--accent); font-family: var(--head); font-size: 22px;
    letter-spacing: 1px; display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
  }
  .ticker__viewport { overflow: hidden; flex: 1; display: flex; align-items: center; }
  .ticker__track { display: flex; align-items: center; white-space: nowrap; animation: marq 38s linear infinite; will-change: transform; }
  .ticker:hover .ticker__track { animation-play-state: paused; }
  .ticker__item { font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.04em; padding: 0 22px; display: inline-flex; align-items: center; gap: 12px; text-transform: uppercase; }
  .ticker__star { color: #000; }
  @keyframes marq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .ticker--static { align-items: center; }
  .ticker__stack { flex: 1; display: flex; flex-direction: column; padding: 6px 18px; gap: 2px; }
  .ticker__row { font-family: var(--mono); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; display: flex; align-items: center; gap: 8px; }
  .ticker__dot { width: 6px; height: 6px; background: #000; flex-shrink: 0; }

  .score-chip {
    background: #000; color: var(--ink); display: flex; align-items: center; gap: 10px;
    padding: 0 16px; flex-shrink: 0; border-left: 3px solid #000;
  }
  .score-chip__live { display: flex; align-items: center; gap: 5px; color: var(--accent); font-family: var(--mono); font-weight: 700; font-size: 10px; letter-spacing: 0.15em; }
  .score-chip__pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .score-chip__match { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); }
  .score-chip__line { font-family: var(--head); font-size: 18px; letter-spacing: 0.5px; color: var(--ink); white-space: nowrap; }
  .score-chip__match { white-space: nowrap; }
  @media (max-width: 1040px) { .score-chip__match { display: none; } }
  @media (max-width: 560px) { .score-chip { display: none; } }

  /* ============ SECTION LABELS / TAGS ============ */
  .sec-label { display: flex; align-items: center; gap: 10px; font-family: var(--head); font-size: 26px; letter-spacing: 1px; white-space: nowrap; }
  .sec-label__tick { background: var(--accent); color: #000; font-family: var(--mono); font-weight: 700; font-size: 13px; padding: 2px 8px; letter-spacing: 0; }
  .tag { font-family: var(--mono); font-weight: 700; font-size: 10px; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; }
  .tag--solid { background: var(--accent); color: #000; padding: 3px 8px; }

  /* ============ HERO ============ */
  .hero { padding: 26px 24px 40px; max-width: 1360px; margin: 0 auto; }
  .hero__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--hair); }
  .hero__dateline { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; color: var(--muted); }

  .hero__grid { display: grid; gap: 0; }
  .hero__grid.is-mega {
    grid-template-columns: 1.7fr 1fr 0.95fr;
    grid-template-areas: "lead secs trend";
  }
  .hero__grid.is-masonry {
    grid-template-columns: 1.25fr 1fr 0.95fr;
    grid-template-areas: "lead lead trend" "secs secs trend";
    gap: 0;
  }
  .lead { grid-area: lead; border-right: 1px solid var(--hair); padding-right: 24px; }
  .secs { grid-area: secs; border-right: 1px solid var(--hair); padding: 0 24px; display: flex; flex-direction: column; }
  .is-masonry .secs { flex-direction: row; gap: 22px; padding-top: 22px; margin-top: 22px; border-top: 1px solid var(--hair); }
  .is-masonry .lead { border-right: none; padding-right: 0; }
  .is-masonry .secs .sec { flex: 1; }
  .trend { grid-area: trend; padding-left: 24px; }
  @media (max-width: 980px) {
    .hero__grid.is-mega, .hero__grid.is-masonry { grid-template-columns: 1fr; grid-template-areas: "lead" "secs" "trend"; }
    .lead, .secs { border-right: none; padding: 0; }
    .secs { flex-direction: column !important; border-top: 1px solid var(--hair); margin-top: 24px; padding-top: 24px; }
    .trend { padding-left: 0; border-top: 1px solid var(--hair); margin-top: 24px; padding-top: 24px; }
  }

  .lead__body { padding-top: 16px; }
  .lead__kicker { margin-bottom: 12px; }
  .lead__title {
    font-family: var(--head); font-weight: 400; font-size: clamp(34px, 4.4vw, 62px);
    line-height: 0.92; letter-spacing: 0.5px; margin: 0 0 14px; text-wrap: balance;
  }
  .lead:hover .lead__title { color: var(--accent); }
  .lead__title, .lead__watch, .nav__link, .sec__title a, .trend__item a { transition: color .12s; }
  .lead__dek { font-size: 16px; line-height: 1.5; color: #c4c4c4; max-width: 56ch; margin: 0 0 18px; }
  .lead__meta { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); flex-wrap: wrap; }
  .byline { color: var(--ink); font-weight: 700; }
  .dot { color: var(--accent); font-size: 7px; }
  .lead__watch { color: var(--accent); font-weight: 700; }

  /* video player */
  .vp { position: relative; }
  .vp__btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 74px; height: 74px; background: var(--accent); color: #000;
    font-size: 26px; display: flex; align-items: center; justify-content: center;
    border: 3px solid #000; box-shadow: 0 0 0 3px var(--accent); transition: transform .1s;
  }
  .vp__btn:hover { transform: translate(-50%,-50%) scale(1.08); }
  .vp__btn.is-playing { background: #000; color: var(--accent); }
  .vp__bar { display: flex; align-items: center; gap: 12px; background: #000; border: 1px solid var(--hair); border-top: none; padding: 8px 12px; }
  .vp__rec { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); flex-shrink: 0; }
  .vp__recdot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .vp__track { flex: 1; height: 4px; background: #222; }
  .vp__fill { height: 100%; background: var(--accent); transition: width .3s; }
  .vp__time { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }

  /* secondary cards */
  .sec { padding: 16px 0; border-bottom: 1px solid var(--hair); display: grid; grid-template-columns: 96px 1fr; gap: 14px; }
  .sec:first-child { padding-top: 0; }
  .sec:last-child { border-bottom: none; }
  .is-masonry .sec { display: block; border-bottom: none; padding: 0; }
  .is-masonry .sec .ph { margin-bottom: 12px; }
  .sec__body { display: flex; flex-direction: column; gap: 7px; }
  .sec__title { font-family: var(--head); font-weight: 400; font-size: clamp(19px, 1.9vw, 25px); line-height: 0.98; letter-spacing: 0.3px; margin: 0; }
  .sec:hover .sec__title { color: var(--accent); }
  .sec__meta { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--muted); }

  /* trending */
  .trend__head { display: flex; flex-direction: column; gap: 6px; padding-bottom: 12px; border-bottom: 3px solid var(--line); margin-bottom: 4px; }
  .trend__title { font-family: var(--head); font-size: 28px; letter-spacing: 1px; }
  .trend__live { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--muted); }
  .trend__pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s infinite; }
  .trend__list { list-style: none; margin: 0; padding: 0; counter-reset: t; }
  .trend__item { display: grid; grid-template-columns: 42px 1fr; gap: 10px; padding: 14px 0; border-bottom: 1px solid var(--hair); align-items: start; }
  .trend__num { font-family: var(--head); font-size: 34px; line-height: 0.8; color: var(--dim); }
  .trend__item:hover .trend__num { color: var(--accent); }
  .trend__txt { display: flex; flex-direction: column; gap: 5px; }
  .trend__tag { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent); }
  .trend__txt a { font-size: 14px; line-height: 1.25; font-weight: 600; }
  .trend__item:hover .trend__txt a { color: var(--accent); }
  .trend__more { display: inline-block; margin-top: 16px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); }

  /* ============ ROSTER ============ */
  .roster { border-top: 3px solid var(--line); border-bottom: 3px solid var(--line); padding: 30px 0; background: #050505; }
  .roster__head { max-width: 1360px; margin: 0 auto; padding: 0 24px 20px; }
  .roster__sub { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted); }
  .roster__nav { display: flex; gap: 8px; }
  .roster__nav button { width: 38px; height: 38px; border: 2px solid var(--ink); font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .roster__nav button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .roster__track {
    display: flex; gap: 18px; overflow-x: auto; padding: 4px 24px 16px;
    max-width: 1360px; margin: 0 auto; cursor: grab; scrollbar-width: thin;
    scrollbar-color: var(--accent) #111; scroll-snap-type: x proximity;
  }
  .roster__track.is-grabbing { cursor: grabbing; user-select: none; }
  .roster__track::-webkit-scrollbar { height: 8px; }
  .roster__track::-webkit-scrollbar-track { background: #111; }
  .roster__track::-webkit-scrollbar-thumb { background: var(--accent); }

  .card {
    flex: 0 0 244px; scroll-snap-align: start; background: #000; border: 2px solid var(--line);
    display: flex; flex-direction: column; transition: transform .14s, box-shadow .14s;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 10px 10px 0 var(--card); border-color: var(--card); }
  .card__top { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 2px solid var(--line); }
  .card__num { font-family: var(--head); font-size: 26px; line-height: 0.8; color: var(--card); }
  .card__beat { font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-align: right; }
  .card__name { font-family: var(--head); font-size: 27px; letter-spacing: 0.5px; padding: 10px 10px 0; line-height: 0.9; }
  .card__handle { font-family: var(--mono); font-size: 10px; color: var(--card); padding: 3px 10px 8px; }
  .card__stats { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid var(--hair); }
  .card__stat { padding: 8px 4px; text-align: center; border-right: 1px solid var(--hair); }
  .card__stat:last-child { border-right: none; }
  .card__statv { display: block; font-family: var(--head); font-size: 20px; line-height: 0.9; }
  .card__statk { font-family: var(--mono); font-size: 7px; letter-spacing: 0.1em; color: var(--muted); }
  .card__cta { background: var(--card); color: #000; font-family: var(--head); font-size: 19px; letter-spacing: 1px; padding: 9px; border-top: 2px solid var(--line); }
  .card__cta:hover { filter: brightness(1.1); }

  .mug {
    flex: 0 0 230px; scroll-snap-align: start; position: relative; border: 2px solid var(--line);
    transition: transform .14s, box-shadow .14s; overflow: hidden;
  }
  .mug:hover { transform: translateY(-6px); box-shadow: 10px 10px 0 var(--card); border-color: var(--card); }
  .mug__overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 12px 12px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.92) 55%); }
  .mug__num { font-family: var(--head); font-size: 40px; line-height: 0.7; color: var(--card); display: block; }
  .mug__name { font-family: var(--head); font-size: 30px; letter-spacing: 0.5px; line-height: 0.9; margin-top: 4px; }
  .mug__beat { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--muted); margin-top: 4px; }
  .mug__handle { position: absolute; top: 10px; right: 10px; font-family: var(--mono); font-size: 9px; font-weight: 700; background: var(--card); color: #000; padding: 3px 6px; }

  .roster__all {
    flex: 0 0 150px; scroll-snap-align: start; border: 2px dashed var(--dim); display: flex;
    align-items: center; justify-content: center; text-align: center; font-family: var(--head);
    font-size: 24px; line-height: 0.95; letter-spacing: 0.5px; color: var(--muted);
  }
  .roster__all:hover { border-color: var(--accent); color: var(--accent); }

  /* ============ MERCH ============ */
  .merch { padding: 0; }
  .merch__banner { position: relative; overflow: hidden; border-bottom: 3px solid var(--line); background: var(--accent); color: #000; }
  .merch__bgword {
    position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
    font-family: var(--head); font-size: 18vw; line-height: 0.8; color: rgba(0,0,0,0.07);
    white-space: nowrap; pointer-events: none; letter-spacing: 2px;
  }
  .merch__head { position: relative; max-width: 1360px; margin: 0 auto; padding: 44px 24px; display: grid; grid-template-columns: 1fr 1.15fr; gap: 40px; align-items: center; }
  @media (max-width: 900px) { .merch__head { grid-template-columns: 1fr; } }
  .merch .sec-label { color: #000; }
  .merch .sec-label__tick { background: #000; color: var(--accent); }
  .merch__title { font-family: var(--head); font-size: clamp(52px, 8vw, 104px); line-height: 0.82; letter-spacing: 1px; margin: 14px 0 16px; }
  .merch__dek { font-size: 15px; line-height: 1.5; max-width: 46ch; font-weight: 500; margin: 0 0 22px; }
  .merch__cta { background: #000; color: var(--accent); font-family: var(--head); font-size: 24px; letter-spacing: 1px; padding: 13px 26px; transition: transform .1s; white-space: nowrap; }
  .merch__cta:hover { transform: translate(-3px,-3px); box-shadow: 6px 6px 0 #000; }
  .merch__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .drop { background: #000; color: var(--ink); border: 2px solid #000; }
  .drop .ph { border: none; }
  .drop__row { display: flex; justify-content: space-between; align-items: center; padding: 9px 11px; gap: 8px; }
  .drop__name { font-family: var(--head); font-size: 16px; letter-spacing: 0.3px; line-height: 0.95; }
  .drop__price { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .drop.is-sold { opacity: 0.5; }
  .drop.is-sold .drop__price { color: var(--muted); }

  /* ============ FOOTER ============ */
  .foot { background: #000; border-top: 3px solid var(--line); }
  .foot__top { max-width: 1360px; margin: 0 auto; padding: 44px 24px; display: grid; grid-template-columns: 1fr 2fr; gap: 40px; }
  @media (max-width: 820px) { .foot__top { grid-template-columns: 1fr; } }
  .foot__brand { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .foot__tagline { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); max-width: 28ch; line-height: 1.6; }
  .foot__sub { background: var(--accent); color: #000; font-family: var(--head); font-size: 21px; letter-spacing: 0.5px; padding: 10px 18px; }
  .foot__sub:hover { filter: brightness(1.1); }
  .foot__cols { display: grid; grid-template-columns: repeat(4,1fr); gap: 24px; }
  @media (max-width: 560px) { .foot__cols { grid-template-columns: repeat(2,1fr); } }
  .foot__col { display: flex; flex-direction: column; gap: 9px; }
  .foot__h { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; color: var(--accent); margin-bottom: 4px; }
  .foot__col a { font-size: 13px; color: var(--muted); }
  .foot__col a:hover { color: var(--ink); }
  .foot__bar { border-top: 1px solid var(--hair); max-width: 1360px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; gap: 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--dim); flex-wrap: wrap; }
  .foot__legal { display: flex; gap: 16px; }
  .foot__legal a:hover { color: var(--ink); }

  /* ============ INTENSITY (anti-design) ============ */
  .app[data-intensity="feral"] .sec-label__tick { transform: rotate(-3deg); }
  .app[data-intensity="feral"] .lead__kicker .tag--solid { transform: rotate(-2deg); display: inline-block; }
  .app[data-intensity="feral"] .ph-sticker { transform: rotate(-4deg); }
  .app[data-intensity="feral"] .card:nth-child(odd) { transform: rotate(-1deg); }
  .app[data-intensity="feral"] .card:nth-child(odd):hover { transform: translateY(-6px) rotate(0deg); }
  .app[data-intensity="feral"] .card:nth-child(even) { transform: rotate(1deg); }
  .app[data-intensity="feral"] .card:nth-child(even):hover { transform: translateY(-6px) rotate(0deg); }
  .app[data-intensity="feral"] .merch__cta { transform: rotate(-1.5deg); }

  .app[data-intensity="clean"] .merch__bgword { display: none; }
  .app[data-intensity="clean"] .logo__mark { transform: none; }

  /* tape accents (feral + gritty) */
  .app[data-intensity="feral"] .roster::before,
  .app[data-intensity="gritty"] .roster::before {
    content: "● ● ● THE ROSTER ● ● ● THE ROSTER ● ● ●";
    display: block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.3em;
    color: var(--dim); text-align: center; margin-bottom: 14px;
  }
</style>
<!-- dt-theme.css MUST load AFTER the inline <style> above so its mobile
     layer (≤768px / ≤520px) wins the cascade against the desktop rules
     duplicated inline. Without this link the homepage rendered the
     desktop layout on phones with no breakpoints, so content sat wider
     than the viewport. -->
<link rel="stylesheet" href="dt-theme.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
<script src="dt-config.js"></script>
<script src="dt-auth-client.js"></script>
<script src="dt-auth-gate.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="dt-data.jsx"></script>
<script type="text/babel" src="dt-ui.jsx"></script>
<script type="text/babel" src="dt-blocks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Curated loud palette — all read clean (black text) on a pitch-black bg.
// A new one is rolled on every page load.
const DT_ACCENTS = [
  "#39FF14", "#FFEA00", "#FF3B1D", "#1FB6FF",
  "#FF2D9B", "#C6FF00", "#00FFD1", "#B388FF",
];
const pickAccent = () => DT_ACCENTS[Math.floor(Math.random() * DT_ACCENTS.length)];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#00FFD1",
  "heroLayout": "masonry",
  "rosterStyle": "mugshot",
  "intensity": "feral",
  "tickerStyle": "static"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cityKey, setCityKey] = useState("HUB");
  const city = DT_CITIES[cityKey];

  // Random hub color on each load; the Tweak override wins once the user picks.
  const [randAccent, setRandAccent] = useState(pickAccent);
  const [userPicked, setUserPicked] = useState(false);
  const accent = userPicked ? t.accent : randAccent;

  // live clock in the utility bar
  useEffect(() => {
    function tick() {
      const el = document.getElementById("util-clock");
      if (!el) return;
      const d = new Date();
      const opts = { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Kolkata" };
      el.textContent = d.toLocaleTimeString("en-IN", opts) + " IST";
    }
    tick();
    const id = setInterval(tick, 1000 * 20);
    return () => clearInterval(id);
  }, []);

  const rootStyle = { "--accent": accent };

  return (
    <div className="app" data-intensity={t.intensity} style={rootStyle}>
      <Masthead nav={DT_NAV} cityKey={cityKey} setCityKey={setCityKey} cities={DT_CITIES} />
      <Ticker city={city} tickerStyle={t.tickerStyle} />
      <Hero
        city={city}
        lead={DT_LEAD}
        secondary={DT_SECONDARY}
        trending={DT_TRENDING}
        heroLayout={t.heroLayout}
      />
      <Roster roster={DT_ROSTER} rosterStyle={t.rosterStyle} />
      <Merch drops={DT_DROPS} />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Brand accent" />
        <TweakColor
          label="Hub color"
          value={accent}
          options={DT_ACCENTS}
          onChange={(v) => { setUserPicked(true); setTweak("accent", v); }}
        />
        <TweakButton
          label="\u2684 Reroll random color"
          onClick={() => { setUserPicked(false); setRandAccent(pickAccent()); }}
        />
        <TweakSection label="Anti-design intensity" />
        <TweakRadio
          label="Vibe"
          value={t.intensity}
          options={["clean", "gritty", "feral"]}
          onChange={(v) => setTweak("intensity", v)}
        />
        <TweakSection label="Layout" />
        <TweakRadio
          label="Hero"
          value={t.heroLayout}
          options={["mega", "masonry"]}
          onChange={(v) => setTweak("heroLayout", v)}
        />
        <TweakRadio
          label="Roster cards"
          value={t.rosterStyle}
          options={["trading", "mugshot"]}
          onChange={(v) => setTweak("rosterStyle", v)}
        />
        <TweakRadio
          label="Ticker"
          value={t.tickerStyle}
          options={["marquee", "static"]}
          onChange={(v) => setTweak("tickerStyle", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
