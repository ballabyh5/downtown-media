<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esports — Downtown Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="dt-theme.css" />
<style>
  /* ===== Esports page ===== */
  .es-switch { max-width: 1360px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--hair); flex-wrap: wrap; }
  .es-switch__lbl { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.16em; color: var(--dim); }
  .es-switch__pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .gpill { font-family: var(--head); font-size: 21px; letter-spacing: 0.5px; padding: 5px 14px; border: 2px solid var(--hair); color: var(--muted); line-height: 1; transition: all .12s; white-space: nowrap; }
  .gpill:hover { border-color: var(--ink); color: var(--ink); }
  .gpill.is-on { background: var(--accent); color: #000; border-color: var(--accent); }
  .es-switch__feed { margin-left: auto; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--accent); }

  .es-hero { max-width: 1360px; margin: 0 auto; padding: 26px 24px 36px; }
  .es-hero__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--hair); gap: 12px; flex-wrap: wrap; }
  .es-hero__t { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--muted); }
  .es-hero__grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 26px; align-items: start; }
  @media (max-width: 920px) { .es-hero__grid { grid-template-columns: 1fr; } }

  .stream__screen { position: relative; }
  .stream__live { position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 6px; background: var(--accent); color: #000; font-family: var(--mono); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; padding: 5px 9px; }
  .stream__dot { width: 7px; height: 7px; border-radius: 50%; background: #000; animation: pulse 1.1s infinite; }
  .stream__viewers { position: absolute; top: 12px; right: 12px; background: #000; color: var(--accent); font-family: var(--mono); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; padding: 5px 9px; border: 1px solid var(--hair); }
  .stream__play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 72px; height: 72px; background: var(--accent); color: #000; font-size: 24px; display: flex; align-items: center; justify-content: center; border: 3px solid #000; box-shadow: 0 0 0 3px var(--accent); transition: transform .1s; }
  .stream__play:hover { transform: translate(-50%,-50%) scale(1.08); }
  .stream__play.is-on { background: #000; color: var(--accent); }
  .stream__bar { display: flex; align-items: center; gap: 14px; background: #000; border: 1px solid var(--hair); border-top: none; padding: 9px 13px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; }
  .stream__map { color: var(--accent); font-weight: 700; }
  .stream__note { color: var(--muted); }
  .stream__chat { margin-left: auto; color: var(--ink); font-weight: 700; }
  .stream__chat:hover { color: var(--accent); }
  .es-hero__headline { font-family: var(--head); font-weight: 400; font-size: clamp(30px, 3.6vw, 50px); line-height: 0.92; letter-spacing: 0.5px; margin: 16px 0 12px; text-wrap: balance; }
  .es-hero__dek { font-size: 15px; line-height: 1.5; color: #c0c0c0; max-width: 60ch; margin: 0; }

  .scoreboard { border: 3px solid var(--line); background: #060606; }
  .scoreboard__head { background: var(--accent); color: #000; font-family: var(--head); font-size: 22px; letter-spacing: 1px; padding: 8px 14px; }
  .scoreboard__team { display: flex; align-items: center; gap: 12px; padding: 16px 14px; border-bottom: 1px solid var(--hair); }
  .scoreboard__logo { width: 46px; height: 46px; flex-shrink: 0; background: #111; border: 2px solid var(--card, var(--hair)); color: var(--ink); display: flex; align-items: center; justify-content: center; font-family: var(--head); font-size: 18px; letter-spacing: 0.5px; --card: var(--hair); }
  .scoreboard__name { font-family: var(--head); font-size: 26px; letter-spacing: 0.5px; line-height: 0.9; flex: 1; }
  .scoreboard__s { font-family: var(--head); font-size: 44px; line-height: 0.7; color: var(--dim); }
  .scoreboard__s.is-lead { color: var(--accent); }
  .scoreboard__vs { text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--dim); padding: 6px 0; border-bottom: 1px solid var(--hair); }
  .scoreboard__foot { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); padding: 12px 14px; text-align: center; }
  .scoreboard__cta { width: 100%; background: var(--accent); color: #000; font-family: var(--head); font-size: 22px; letter-spacing: 1px; padding: 12px; border-top: 2px solid var(--line); }
  .scoreboard__cta:hover { filter: brightness(1.12); }

  .es-sec { max-width: 1360px; margin: 0 auto; padding: 34px 24px; }
  .es-sec__head { margin-bottom: 20px; padding-bottom: 13px; border-bottom: 1px solid var(--hair); }
  .es-sec__head--row { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .es-stand__t { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--muted); }

  .es-tabs { display: flex; gap: 0; border: 2px solid var(--hair); }
  .es-tab { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; padding: 8px 14px; color: var(--muted); border-right: 2px solid var(--hair); }
  .es-tab:last-child { border-right: none; }
  .es-tab:hover { color: var(--ink); }
  .es-tab.is-on { background: var(--accent); color: #000; }

  .matchgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 820px) { .matchgrid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .matchgrid { grid-template-columns: 1fr; } }
  .match { border: 2px solid var(--line); background: #000; transition: transform .12s, box-shadow .12s; }
  .match:hover { transform: translateY(-4px); box-shadow: 8px 8px 0 var(--accent); }
  .match__top { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--hair); }
  .match__game { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: var(--muted); }
  .match__status { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--ink); }
  .match--live .match__status { color: var(--accent); }
  .match__pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s infinite; }
  .match__teams { padding: 6px 12px; }
  .match__team { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; }
  .match__team + .match__team { border-top: 1px solid var(--hair); }
  .match__tname { font-family: var(--head); font-size: 25px; letter-spacing: 0.4px; }
  .match__score { font-family: var(--head); font-size: 28px; line-height: 0.7; color: var(--dim); }
  .match__score.is-win { color: var(--accent); }
  .match__foot { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--dim); padding: 9px 12px; border-top: 1px solid var(--hair); }
  .es-empty { border: 2px dashed var(--hair); padding: 40px; text-align: center; font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em; color: var(--muted); }

  /* standings */
  .standtable { border: 2px solid var(--line); }
  .standrow { display: grid; grid-template-columns: 48px 1fr 44px 44px 70px 56px; align-items: center; padding: 13px 14px; border-bottom: 1px solid var(--hair); font-family: var(--head); font-size: 23px; letter-spacing: 0.4px; }
  .standrow:last-child { border-bottom: none; }
  .standrow--head { background: #0a0a0a; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--muted); padding: 10px 14px; }
  .standrow--head span, .standrow__d { text-align: left; }
  .standrow.is-top { background: var(--accent); color: #000; }
  .standrow__rank { color: var(--accent); }
  .standrow.is-top .standrow__rank { color: #000; }
  .standrow__team { display: flex; align-items: center; gap: 12px; }
  .standrow__crown { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; background: #000; color: var(--accent); padding: 3px 7px; }
  .standrow__d { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--muted); }
  .standrow.is-top .standrow__d { color: #000; }
  .standrow__p { color: var(--accent); }
  .standrow.is-top .standrow__p { color: #000; }
  @media (max-width: 600px) {
    .standrow { grid-template-columns: 38px 1fr 40px 56px; }
    .standrow__l, .standrow .standrow__d { display: none; }
    .standrow span:nth-child(4) { display: none; }
  }

  /* stories */
  .es-stories { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 860px) { .es-stories { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .es-stories { grid-template-columns: 1fr; } }
  .es-story__body { display: flex; flex-direction: column; gap: 8px; padding-top: 12px; }
  .es-story__title { font-family: var(--head); font-weight: 400; font-size: clamp(20px, 2.2vw, 26px); line-height: 0.98; letter-spacing: 0.3px; margin: 0; }
  .es-story:hover .es-story__title { color: var(--accent); }
  .es-story__meta { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--muted); }

  /* players */
  .es-players { border-top: 3px solid var(--line); border-bottom: 3px solid var(--line); background: #050505; padding: 30px 0; }
  .player-track { display: flex; gap: 18px; overflow-x: auto; padding: 4px 24px 16px; max-width: 1360px; margin: 0 auto; scrollbar-width: thin; scrollbar-color: var(--accent) #111; }
  .player-track::-webkit-scrollbar { height: 8px; }
  .player-track::-webkit-scrollbar-track { background: #111; }
  .player-track::-webkit-scrollbar-thumb { background: var(--accent); }
  .pcard { flex: 0 0 232px; background: #000; border: 2px solid var(--line); transition: transform .14s, box-shadow .14s; }
  .pcard:hover { transform: translateY(-6px); box-shadow: 10px 10px 0 var(--card); border-color: var(--card); }
  .pcard__top { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 2px solid var(--line); }
  .pcard__role { font-family: var(--head); font-size: 18px; letter-spacing: 0.5px; color: var(--card); }
  .pcard__game { font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); }
  .pcard__name { font-family: var(--head); font-size: 28px; letter-spacing: 0.5px; padding: 10px 10px 0; line-height: 0.9; }
  .pcard__sub { font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; color: var(--card); padding: 4px 10px 10px; }
  .pcard__stats { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--hair); }
  .pcard__stat { padding: 9px 4px; text-align: center; }
  .pcard__stat:first-child { border-right: 1px solid var(--hair); }
  .pcard__sv { display: block; font-family: var(--head); font-size: 24px; line-height: 0.85; color: var(--accent); }
  .pcard__sk { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; color: var(--muted); }

  .app[data-intensity="feral"] .gpill.is-on { transform: rotate(-1.5deg); }
  .app[data-intensity="feral"] .match:nth-child(even) { transform: rotate(0.6deg); }
  .app[data-intensity="feral"] .match:nth-child(even):hover { transform: translateY(-4px) rotate(0deg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="dt-data.jsx"></script>
<script type="text/babel" src="dt-ui.jsx"></script>
<script type="text/babel" src="dt-blocks.jsx"></script>
<script type="text/babel" src="dt-esports.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const ES_ACCENTS = ["#39FF14","#FFEA00","#FF3B1D","#1FB6FF","#FF2D9B","#C6FF00","#00FFD1","#B388FF"];
const pickAccent = () => ES_ACCENTS[Math.floor(Math.random() * ES_ACCENTS.length)];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#39FF14",
  "intensity": "gritty",
  "tickerStyle": "static"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cityKey, setCityKey] = useState("HUB");
  const [game, setGame] = useState("ALL");
  const city = DT_CITIES[cityKey];

  const [randAccent, setRandAccent] = useState(pickAccent);
  const [userPicked, setUserPicked] = useState(false);
  const accent = userPicked ? t.accent : randAccent;

  useEffect(() => {
    function tick() {
      const el = document.getElementById("util-clock");
      if (!el) return;
      const d = new Date();
      el.textContent = d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Kolkata" }) + " IST";
    }
    tick();
    const id = setInterval(tick, 1000 * 20);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="app" data-intensity={t.intensity} style={{ "--accent": accent }}>
      <Masthead nav={DT_NAV} cityKey={cityKey} setCityKey={setCityKey} cities={DT_CITIES} active="ESPORTS" />
      <Ticker city={city} tickerStyle={t.tickerStyle} />
      <ESGameSwitch sel={game} setSel={setGame} />
      <ESHero sel={game} />
      <ESMatches sel={game} />
      <ESStandings sel={game} />
      <ESStories sel={game} />
      <ESPlayers sel={game} />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Brand accent" />
        <TweakColor label="Hub color" value={accent} options={ES_ACCENTS}
          onChange={(v) => { setUserPicked(true); setTweak("accent", v); }} />
        <TweakButton label="⚄ Reroll random color"
          onClick={() => { setUserPicked(false); setRandAccent(pickAccent()); }} />
        <TweakSection label="Anti-design intensity" />
        <TweakRadio label="Vibe" value={t.intensity} options={["clean", "gritty", "feral"]}
          onChange={(v) => setTweak("intensity", v)} />
        <TweakSection label="Ticker" />
        <TweakRadio label="Style" value={t.tickerStyle} options={["marquee", "static"]}
          onChange={(v) => setTweak("tickerStyle", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
